name: Application App CI

on:
    push:
        paths:
            - 'application/payment-exception-review-service/src/**'
            - 'application/payment-exception-review-service/.mvn/**'
            - 'application/payment-exception-review-service/mvnw'
            - 'application/payment-exception-review-service/mvnw.cmd'
            - 'application/payment-exception-review-service/pom.xml'
            - '.github/workflows/application-app-ci.yml'
    pull_request:
        paths:
            - 'application/payment-exception-review-service/src/**'
            - 'application/payment-exception-review-service/.mvn/**'
            - 'application/payment-exception-review-service/mvnw'
            - 'application/payment-exception-review-service/mvnw.cmd'
            - 'application/payment-exception-review-service/pom.xml'
            - '.github/workflows/application-app-ci.yml'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    app-ci:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: application/payment-exception-review-service
                
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Java 21
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: '21'
                cache: maven
                cache-dependency-path: application/payment-exception-review-service/pom.xml
            
            - name: Ensure Maven wrapper is executable
              run: chmod +x mvnw
              
            - name: Run Maven verify
              run: ./mvnw verify
