name: Cluster Bootstrap

on:
    push:
        paths:
            - 'infrastructure/cluster-bootstrap/**'
            - '.github/workflows/cluster-bootstrap.yml'
    workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
    terraform-bootstrap:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: infrastructure/cluster-bootstrap/terraform
        
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Azure login with OIDC
              uses: azure/login@v2
              with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            
            - name: Get AKS credentials
              run: |
                az aks get-credentials --resource-group "${{ vars.RESOURCE_GROUP }}" \
                  --name "${{ vars.AKS_CLUSTER_NAME }}" --overwrite-existing
            
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
            
            - name: Terraform Format Check
              run: terraform fmt -check
            
            - name: Terraform Init
              run: terraform init

            - name: Terraform Validate
              run: terraform validate
            
            - name: Terraform Plan
              run: terraform plan

            - name: Terraform Apply
              if: github.event_name == 'workflow_dispatch'
              run: terraform apply -auto-approve  