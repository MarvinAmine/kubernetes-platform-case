name: Azure Provision

on:
    push:
        paths:
            - 'infrastructure/azure/terraform/**'
            - '.github/workflows/azure-provision.yml'
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

jobs:
    azure-provision:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: infrastructure/azure/terraform
        
        env:  
            TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
            TF_VAR_location: ${{ vars.AKS_LOCATION }}
            TF_VAR_aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
            TF_VAR_dns_prefix: aks-stage1
            TF_VAR_node_count: "1"
            TF_VAR_vm_size: ${{ vars.VM_SIZE || 'Standard_D2as_v6' }}
            TF_VAR_tier: Free
            TF_VAR_vnet_name: ${{ vars.VNET_NAME || 'vnet-stage1-platform' }}
            TF_VAR_vnet_address_space: ${{ vars.VNET_ADDRESS_SPACE || '10.20.0.0/16' }}
            TF_VAR_aks_subnet_name: ${{ vars.AKS_SUBNET_NAME || 'snet-stage1-aks' }}
            TF_VAR_aks_subnet_prefix: ${{ vars.AKS_SUBNET_PREFIX || '10.20.1.0/24' }}
            TF_VAR_postgres_server_name: ${{ vars.POSTGRES_SERVER_NAME }}
            TF_VAR_postgres_database_name: ${{ vars.POSTGRES_DATABASE_NAME }}
            TF_VAR_postgres_admin_username: ${{ vars.POSTGRES_ADMIN_USERNAME }}
            TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
            TF_VAR_postgres_version: ${{ vars.POSTGRES_VERSION || '16' }}
            TF_VAR_postgres_sku_name: ${{ vars.POSTGRES_SKU_NAME }}
            TF_VAR_postgres_storage_mb: ${{ vars.POSTGRES_STORAGE_MB || '32768' }}
            TF_VAR_postgres_backup_retention_days: ${{ vars.POSTGRES_BACKUP_RETENTION_DAYS || '7' }}
            TF_VAR_postgres_zone: ${{ vars.POSTGRES_ZONE || '1' }}
            TF_VAR_postgres_subnet_name: ${{ vars.POSTGRES_SUBNET_NAME || 'snet-stage1-postgres' }}
            TF_VAR_postgres_subnet_prefix: ${{ vars.POSTGRES_SUBNET_PREFIX || '10.20.2.0/28' }}
            TF_VAR_postgres_private_dns_zone_name: ${{ vars.POSTGRES_PRIVATE_DNS_ZONE_NAME || 'stage1-platform.postgres.database.azure.com' }}
            TF_VAR_postgres_private_dns_zone_link_name: ${{ vars.POSTGRES_PRIVATE_DNS_ZONE_LINK_NAME || 'stage1-platform-postgres-dns-link' }}

            TF_BACKEND_RESOURCE_GROUP: ${{ vars.TF_BACKEND_RESOURCE_GROUP }}
            TF_BACKEND_STORAGE_ACCOUNT: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
            TF_BACKEND_CONTAINER: ${{ vars.TF_BACKEND_CONTAINER }}
            ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
            ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
            ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Preflight repository configuration
              run: |
                required_vars=(
                  TF_BACKEND_RESOURCE_GROUP
                  TF_BACKEND_STORAGE_ACCOUNT
                  TF_BACKEND_CONTAINER
                  TF_VAR_resource_group_name
                  TF_VAR_location
                  TF_VAR_aks_cluster_name
                  TF_VAR_vnet_name
                  TF_VAR_vnet_address_space
                  TF_VAR_aks_subnet_name
                  TF_VAR_aks_subnet_prefix
                  TF_VAR_postgres_server_name
                  TF_VAR_postgres_database_name
                  TF_VAR_postgres_admin_username
                  TF_VAR_postgres_sku_name
                  TF_VAR_postgres_subnet_name
                  TF_VAR_postgres_subnet_prefix
                  TF_VAR_postgres_private_dns_zone_name
                  TF_VAR_postgres_private_dns_zone_link_name
                )
                for name in "${required_vars[@]}"; do
                  if [[ -z "${!name:-}" ]]; then
                    echo "ERROR: Missing GitHub repository variable: ${name}."
                    echo "Run ./bootstrap_infrastructure_and_provision_platform.sh and configure the repository variables described in README.md."
                    exit 1
                  fi
                done

                required_secrets=(
                  ARM_CLIENT_ID
                  ARM_TENANT_ID
                  ARM_SUBSCRIPTION_ID
                  TF_VAR_postgres_admin_password
                )
                for name in "${required_secrets[@]}"; do
                  if [[ -z "${!name:-}" ]]; then
                    echo "ERROR: Missing GitHub repository secret backing: ${name}."
                    echo "Run infrastructure/azure/oidc/create_az_oidc.sh and configure the repository secrets described in README.md."
                    exit 1
                  fi
                done

            - name: Azure login with OIDC
              uses: azure/login@v2
              with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            
            - name: Preflight Azure backend access
              run: |
                az storage account show \
                  --name "${TF_BACKEND_STORAGE_ACCOUNT}" \
                  --resource-group "${TF_BACKEND_RESOURCE_GROUP}" \
                  --output none
                
                az storage container show \
                  --name "${TF_BACKEND_CONTAINER}" \
                  --account-name "${TF_BACKEND_STORAGE_ACCOUNT}" \
                  --auth-mode login \
                  --output none
                  
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Format Check
              run: terraform fmt -check -diff

            - name: Terraform Init
              run: |
                terraform init \
                  -backend-config="resource_group_name=${TF_BACKEND_RESOURCE_GROUP}" \
                  -backend-config="storage_account_name=${TF_BACKEND_STORAGE_ACCOUNT}" \
                  -backend-config="container_name=${TF_BACKEND_CONTAINER}" \
                  -backend-config="key=azure/terraform.tfstate" \
                  -backend-config="use_oidc=true" \
                  -backend-config="use_azuread_auth=true" \
                  -backend-config="client_id=${ARM_CLIENT_ID}" \
                  -backend-config="tenant_id=${ARM_TENANT_ID}" \
                  -backend-config="subscription_id=${ARM_SUBSCRIPTION_ID}"

            - name: Terraform Validate
              run: terraform validate
              
            - name: Terraform Plan
              run: terraform plan

            - name: Terraform Apply
              if: github.event_name == 'workflow_dispatch'
              run: terraform apply -auto-approve
