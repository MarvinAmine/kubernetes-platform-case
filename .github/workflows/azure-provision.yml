name: Azure Provision

on:
    push:
        paths:
            - 'infrastructure/azure/**'
            - '.github/workflows/azure-provision.yml'
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

jobs:
    azure-provision:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: infrastructure/azure/terraform
        
        env:
            TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP }}
            TF_VAR_location: ${{ vars.AKS_LOCATION }}
            TF_VAR_aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME }}
            TF_VAR_dns_prefix: aks-stage1
            TF_VAR_node_count: "1"
            TF_VAR_vm_size: Standard_D2as_v6
            TF_VAR_tier: Free

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Azure login with OIDC
              uses: azure/login@v2
              with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Format Check
              run: terraform fmt -check

            - name: Terraform Init
              run: terraform init  

            - name: Terraform Validate
              run: terraform validate
              
            - name: Terraform Plan
              run: terraform plan

            - name: Terraform Apply
              if: github.event_name == 'workflow_dispatch'
              run: terraform apply -auto-approve