name: App Deploy

on:
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    app-deploy:
        runs-on: ubuntu-latest

        env:
            IMAGE_NAME: payment-exception-review-service
            APP_DIRECTORY: application/payment-exception-review-service

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Normalize registry owner
              id: registry
              run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_OUTPUT}"

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Extract image metadata
              id: metadata
              uses: docker/metadata-action@v5
              with:
                images: ghcr.io/${{ steps.registry.outputs.owner_lc }}/${{ env.IMAGE_NAME }}
                tags: |
                    type=sha,format=short
                    type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                context: ${{ env.APP_DIRECTORY }}
                file: ${{ env.APP_DIRECTORY }}/Dockerfile
                push: true
                tags: ${{ steps.metadata.outputs.tags }}
                labels: ${{ steps.metadata.outputs.labels }}
