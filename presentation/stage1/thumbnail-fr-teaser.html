<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Miniature FR - Plateforme bancaire invisible</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700;800&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #10211b;
      --muted: #557069;
      --green: #0e6b57;
      --mint: #7ee8b7;
      --amber: #ffd166;
      --orange: #e66d2f;
      --blue: #2f80ed;
      --paper: #fbfff8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--ink);
      font-family: "Space Grotesk", sans-serif;
      background:
        radial-gradient(circle at 15% 16%, rgba(126,232,183,0.42), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(47,128,237,0.2), transparent 25%),
        radial-gradient(circle at 78% 88%, rgba(255,209,102,0.28), transparent 28%),
        #edf8ef;
    }

    .canvas {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(110deg, rgba(255,255,250,0.98), rgba(239,252,244,0.98) 44%, rgba(236,244,255,0.98)),
        var(--paper);
      box-shadow: 0 34px 110px rgba(14, 107, 87, 0.24);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: -80px;
      z-index: -3;
      background:
        radial-gradient(circle at 12% 18%, rgba(126,232,183,0.48), transparent 20%),
        radial-gradient(circle at 58% 4%, rgba(255,209,102,0.32), transparent 22%),
        radial-gradient(circle at 86% 42%, rgba(47,128,237,0.22), transparent 28%),
        radial-gradient(circle at 48% 100%, rgba(230,109,47,0.2), transparent 28%);
      filter: blur(7px);
    }

    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(90deg, rgba(14,107,87,0.055) 1px, transparent 1px),
        linear-gradient(rgba(14,107,87,0.055) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(90deg, rgba(0,0,0,0.84), rgba(0,0,0,0.24), rgba(0,0,0,0.76));
    }

    .bank-card {
      position: absolute;
      top: 36px;
      left: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 17px;
      border-radius: 999px;
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(14,107,87,0.16);
      box-shadow: 0 14px 34px rgba(14,107,87,0.14);
      font: 800 15px/1 "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0b493c;
      z-index: 8;
    }

    .bank-card img {
      width: 22px;
      height: 22px;
    }

    .release-badge {
      position: absolute;
      top: 36px;
      right: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 17px;
      border-radius: 999px;
      background: rgba(255,255,255,0.84);
      color: #0b493c;
      border: 1px solid rgba(14,107,87,0.16);
      box-shadow: 0 14px 34px rgba(14,107,87,0.14);
      font: 800 15px/1 "IBM Plex Mono", monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 8;
    }

    .release-badge strong,
    .release-badge span {
      display: block;
    }

    .release-badge strong {
      font: inherit;
    }

    .release-badge span {
      margin-top: 4px;
      color: #557069;
      font-size: 11px;
      letter-spacing: 0.11em;
    }

    .release-badge img {
      width: 22px;
      height: 22px;
    }

    .hero {
      position: absolute;
      left: 52px;
      top: 118px;
      width: 680px;
      z-index: 5;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 9px 13px;
      margin-bottom: 18px;
      border-radius: 999px;
      color: #07120e;
      background: linear-gradient(90deg, var(--mint), var(--amber));
      font: 900 16px/1 "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 18px 38px rgba(126,232,183,0.28);
    }

    h1 {
      margin: 0;
      max-width: 690px;
      font-family: "Archivo Black", sans-serif;
      font-size: 86px;
      line-height: 0.88;
      letter-spacing: -0.075em;
      text-transform: uppercase;
      color: #10211b;
      text-wrap: balance;
      filter: drop-shadow(0 18px 34px rgba(14,107,87,0.14));
    }

    h1 .accent {
      display: block;
      color: transparent;
      background: linear-gradient(90deg, #0e6b57, #2f80ed 58%, #d97633);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .subtitle {
      margin: 22px 0 0;
      max-width: 620px;
      color: #2f463c;
      font-size: 27px;
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: -0.035em;
    }

    .subtitle strong {
      color: #b45a20;
    }

    .proof-strip {
      position: absolute;
      left: 52px;
      bottom: 42px;
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 14px;
      z-index: 8;
    }

    .proof {
      min-width: 168px;
      padding: 16px 18px;
      border-radius: 22px;
      border: 1px solid rgba(14,107,87,0.14);
      background: rgba(255,255,255,0.84);
      box-shadow: 0 18px 40px rgba(14,107,87,0.14), inset 0 1px 0 rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
    }

    .proof:nth-child(1) { background: linear-gradient(180deg, rgba(126,232,183,0.58), rgba(255,255,255,0.86)); }
    .proof:nth-child(2) { background: linear-gradient(180deg, rgba(255,209,102,0.58), rgba(255,255,255,0.86)); }
    .proof:nth-child(3) { background: linear-gradient(180deg, rgba(47,128,237,0.32), rgba(255,255,255,0.88)); }

    .proof-value {
      display: block;
      font-family: "Archivo Black", sans-serif;
      font-size: 35px;
      line-height: 0.96;
      letter-spacing: -0.055em;
      color: #10211b;
    }

    .proof-label {
      display: block;
      margin-top: 7px;
      color: #446259;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .visual-stack {
      position: absolute;
      right: 28px;
      top: 96px;
      width: 440px;
      height: 510px;
      z-index: 4;
    }

    .path-card {
      position: absolute;
      overflow: hidden;
      border-radius: 25px;
      background: #fff;
      border: 1px solid rgba(14,107,87,0.16);
      box-shadow: 0 30px 80px rgba(14,107,87,0.2);
    }

    .path-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
      filter: saturate(1.04) contrast(1.02);
    }

    .path-card.platform {
      right: 12px;
      top: 28px;
      width: 252px;
      height: 292px;
      transform: rotate(3deg);
      z-index: 4;
    }

    .path-card.infra {
      left: 58px;
      bottom: 58px;
      width: 270px;
      height: 288px;
      transform: rotate(-4deg);
      z-index: 9;
    }

    .path-card.app {
      position: absolute;
      left: -117px;
      top: 24px;
      width: 240px;
      height: 282px;
      transform: translateX(-50%) rotate(1.5deg);
      z-index: 7;
    }

    .stamp {
      position: absolute;
      right: 0;
      top: 367px;
      width: 187px;
      height: 187px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.38), transparent 24%),
        linear-gradient(135deg, var(--mint), var(--amber));
      color: #06130e;
      transform: rotate(-12deg);
      box-shadow: 0 28px 60px rgba(126,232,183,0.36);
      font-family: "Archivo Black", sans-serif;
      text-align: center;
      text-transform: uppercase;
      font-size: 29px;
      line-height: 0.9;
      letter-spacing: -0.05em;
      z-index: 1;
    }

    .stamp span {
      display: block;
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .stamp::before {
      content: "";
    }

    .tech-strip {
      position: absolute;
      right: 42px;
      bottom: 31px;
      display: flex;
      gap: 12px;
      z-index: 9;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(14,107,87,0.13);
      box-shadow: 0 18px 42px rgba(14,107,87,0.18);
    }

    .tech-strip img {
      width: 33px;
      height: 33px;
      padding: 5px;
      border-radius: 50%;
      background: rgba(14,107,87,0.06);
    }

    .floating-icon {
      position: absolute;
      width: 45px;
      height: 45px;
      padding: 8px;
      border-radius: 17px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(14,107,87,0.12);
      opacity: 0.46;
      z-index: 1;
    }

    .floating-icon:nth-of-type(1) { left: 810px; top: 52px; }
    .floating-icon:nth-of-type(2) { left: 748px; top: 608px; }
    .floating-icon:nth-of-type(3) { left: 35px; top: 426px; }
    .floating-icon:nth-of-type(4) { left: 1114px; top: 334px; }

  </style>
</head>
<body>
  <main class="canvas" aria-label="Miniature de présentation française">
    <img class="floating-icon" src="../assets/presentation-icons/kubernetes.svg" alt="">
    <img class="floating-icon" src="../assets/presentation-icons/terraform.svg" alt="">
    <img class="floating-icon" src="../assets/presentation-icons/github-actions.svg" alt="">
    <img class="floating-icon" src="../assets/presentation-icons/grafana.svg" alt="">

    <div class="bank-card">
      <img src="../assets/presentation-icons/azure.svg" alt="">
      Plateforme bancaire
    </div>

    <div class="release-badge">
      <img src="../assets/presentation-icons/github-releases.svg" alt="">
      <div>
        <strong>Étape 1 v1.0.0</strong>
        <span>Open source MIT</span>
      </div>
    </div>

    <section class="hero">
      <div class="eyebrow">Plus de 125h de construction documentée</div>
      <h1>
        Derrière votre
        <span class="accent">app bancaire</span>
      </h1>
      <p class="subtitle">
        Terraform + Kubernetes + GitHub Actions + Helm + Grafana, compressés dans une <strong>fondation de livraison gouvernée</strong>.
      </p>
    </section>

    <section class="proof-strip" aria-label="preuves principales">
      <div class="proof">
        <span class="proof-value">20 min</span>
        <span class="proof-label">bootstrap</span>
      </div>
      <div class="proof">
        <span class="proof-value">&lt; CA$4</span>
        <span class="proof-label">par mois</span>
      </div>
      <div class="proof">
        <span class="proof-value">1 script</span>
        <span class="proof-label">chemin principal</span>
      </div>
    </section>

    <section class="visual-stack" aria-label="chemins de livraison">
      <div class="stamp" aria-hidden="true"></div>
      <div class="path-card platform">
        <img src="../assets/platform_provision_path.png" alt="Chemin Plateforme">
      </div>
      <div class="path-card infra">
        <img src="../assets/infrastructure_bootstrap_path.png" alt="Chemin Infrastructure">
      </div>
      <div class="path-card app" aria-label="Chemin Application">
        <img src="../assets/app_delivery_path.png" alt="Chemin Application">
      </div>
    </section>

    <div class="tech-strip" aria-label="technologies">
      <img src="../assets/presentation-icons/azure.svg" alt="Azure">
      <img src="../assets/presentation-icons/kubernetes.svg" alt="Kubernetes">
      <img src="../assets/presentation-icons/terraform.svg" alt="Terraform">
      <img src="../assets/presentation-icons/github-actions.svg" alt="GitHub Actions">
      <img src="../assets/presentation-icons/docker.svg" alt="Docker">
      <img src="../assets/presentation-icons/helm.svg" alt="Helm">
      <img src="../assets/presentation-icons/spring-boot.svg" alt="Spring Boot">
      <img src="../assets/presentation-icons/prometheus.svg" alt="Prometheus">
      <img src="../assets/presentation-icons/grafana.svg" alt="Grafana">
    </div>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
  <script>
    anime({
      targets: ".floating-icon",
      translateY: () => anime.random(-16, 16),
      translateX: () => anime.random(-14, 14),
      rotate: () => anime.random(-8, 8),
      direction: "alternate",
      easing: "easeInOutSine",
      duration: () => anime.random(3200, 5200),
      loop: true,
      delay: anime.stagger(170)
    });

    anime({
      targets: ".path-card",
      translateY: [18, 0],
      opacity: [0, 1],
      delay: anime.stagger(120, { start: 220 }),
      duration: 900,
      easing: "easeOutExpo"
    });

    anime({
      targets: ".proof",
      scale: [0.9, 1],
      opacity: [0, 1],
      delay: anime.stagger(110, { start: 330 }),
      duration: 700,
      easing: "easeOutBack"
    });
  </script>
</body>
</html>
