{{- if .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "payment-exception-review-service.fullname" . }}
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    {{- include "payment-exception-review-service.labels" . | nindent 4 }}
    {{- with .Values.monitoring.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

spec:
  namespaceSelector:
    matchNames:
      - {{ .Values.platform.namespace }}
  selector:
    matchLabels:
      {{- include "payment-exception-review-service.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: {{ .Values.monitoring.serviceMonitor.path }}
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout }}
{{- end }}