spring.application.name=payment-exception-review-service
application.version=0.0.1-SNAPSHOT

# App runtime values
app.validation-mode=STANDARD
app.escalation-enabled=true
app.risk-amount-threshold=10000
app.region=CA-QC
app.environment-name=stage1
app.infrastructure-owner=infrastructure-team
app.platform-owner=platform-team
app.log-level=INFO

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_exception_review}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

# Actuator exposure for probes and Prometheus scraping.
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true

