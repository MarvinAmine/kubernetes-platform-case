spring.application.name=payment-exception-review-service
application.version=0.0.1-SNAPSHOT

# App runtime values
app.validation-mode=STANDARD
app.escalation-enabled=true
app.risk-amount-threshold=10000
app.region=CA-QC
app.environment-name=stage1
app.infrastructure-owner=infrastructure-team
app.platform-owner=platform-team
app.log-level=INFO

# Database
spring.datasource.url=jdbc:h2:mem:paymentreview;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true

